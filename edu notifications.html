<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduConnect | الإشعارات</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --bg-color: #f0f4f8; --text-main: #1a202c; --text-muted: #4a5568;
            --accent: #006684; --nav-bg: rgba(255, 255, 255, 0.98);
            --card-bg: rgba(255, 255, 255, 0.95); --border-color: rgba(0, 0, 0, 0.08);
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
        }
        body.dark-mode {
            --bg-color: #030712; --text-main: #f8fafc; --text-muted: #94a3b8;
            --accent: #c5a367; --nav-bg: rgba(3, 7, 18, 0.98);
            --card-bg: rgba(30, 41, 59, 0.95); --border-color: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; transition: background 0.3s, color 0.3s; }
        body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }

        nav {
            position: fixed; top: 0; width: 100%; height: 75px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5%; background: var(--nav-bg); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color); z-index: 1000;
        }
        .logo img { height: 45px; object-fit: contain; }
        .nav-links { display: flex; gap: 8px; }
        .nav-link-btn {
            background: transparent; border: 1px solid transparent; padding: 10px 15px; 
            border-radius: 14px; color: var(--text-main); text-decoration: none; 
            font-weight: 700; font-size: 0.85rem; display: flex; align-items: center; gap: 8px;
        }
        .nav-link-btn.active { background: rgba(197, 163, 103, 0.1); color: var(--accent); border-color: var(--accent); }

        .notif-wrapper { max-width: 800px; margin: 110px auto 50px; padding: 0 20px; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .header-flex h1 { font-size: 1.6rem; font-weight: 900; }

        .notif-list { display: flex; flex-direction: column; gap: 15px; }
        .notif-item {
            background: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 20px; padding: 20px; display: flex; align-items: center;
            gap: 15px; box-shadow: var(--shadow); position: relative;
        }
        
        .notif-icon {
            width: 50px; height: 50px; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; background: rgba(197, 163, 103, 0.1); color: var(--accent);
        }

        .notif-content { flex: 1; }
        .notif-content h4 { font-size: 1rem; margin-bottom: 4px; font-weight: 800; }
        .notif-content p { font-size: 0.85rem; color: var(--text-muted); }
        .notif-time { font-size: 0.75rem; color: var(--text-muted); margin-top: 5px; display: block; }

        .notif-actions { display: flex; gap: 10px; }
        .action-btn {
            padding: 8px 16px; border-radius: 12px; border: none;
            font-weight: 700; font-size: 0.8rem; cursor: pointer; transition: 0.2s;
        }
        .accept-btn { background: #2ecc71; color: white; }
        .accept-btn:hover { background: #27ae60; }
        .reject-btn { background: rgba(231, 76, 60, 0.1); color: #e74c3c; border: 1px solid rgba(231, 76, 60, 0.2); }
        .reject-btn:hover { background: #e74c3c; color: white; }

        .empty-state { text-align: center; padding: 50px; opacity: 0.6; }
        .empty-state i { font-size: 3rem; margin-bottom: 15px; display: block; }

        @media (max-width: 600px) {
            .nav-link-btn span { display: none; }
            .notif-item { flex-direction: column; text-align: center; padding: 25px; }
            .notif-actions { width: 100%; justify-content: center; margin-top: 15px; }
        }
    </style>
</head>
<body class="dark-mode"> <!-- الافتراضي لمشروعك هو Dark Mode -->

    <nav>
        <div class="logo"><img id="main-logo" src="dark.png" alt="Logo"></div>
        <div class="nav-links">
            <a href="mm.html" class="nav-link-btn"><i class="fas fa-home"></i> <span>الرئيسية</span></a>
            <a href="search.html" class="nav-link-btn"><i class="fas fa-search"></i> <span>البحث</span></a>
            <a href="notifications.html" class="nav-link-btn active"><i class="fas fa-bell"></i> <span>الإشعارات</span></a>
            <a href="groups.html" class="nav-link-btn"><i class="fas fa-users"></i> <span>المجموعات</span></a>
            <a href="settings.html" class="nav-link-btn"><i class="fas fa-cog"></i> <span>الإعدادات</span></a>
        </div>
    </nav>

    <div class="notif-wrapper">
        <div class="header-flex">
            <h1>الإشعارات</h1>
            <span id="notif-count" style="background: var(--accent); color: #000; padding: 2px 12px; border-radius: 20px; font-weight: 800; font-size: 0.9rem;">0</span>
        </div>

        <div class="notif-list" id="notifList">
            <div class="empty-state">
                <i class="fas fa-spinner fa-spin"></i>
                <p>جاري مزامنة الإشعارات...</p>
            </div>
        </div>
    </div>
 <script>
// إعدادات Appwrite
const { Client, Account, Databases, Query } = Appwrite;
const client = new Client().setEndpoint('https://cloud.appwrite.io/v1').setProject('6a00844400157b7e6917');
const account = new Account(client);
const databases = new Databases(client);

const DB_ID = "6a009dd400164dc7b0a8"; 
const USERS_COLL = "usersdata";       
const REQUESTS_COLL = "requests_data"; 
const GROUPS_COLL = "groups"; 

let currentUser = null;
let userRole = ''; 

async function init() {
    const list = document.getElementById('notifList');
    try {
        // 1. محاولة جلب الحساب الحالي
        currentUser = await account.get();
        console.log("✅ المستخدم الحالي:", currentUser.$id);
        
        // 2. جلب رتبة المستخدم (Role)
        try {
            const userData = await databases.getDocument(DB_ID, USERS_COLL, currentUser.$id);
            userRole = userData.role;
        } catch (roleError) {
            console.warn("⚠️ بيانات المستخدم غير موجودة في usersdata، تعيين كطالب افتراضياً");
            userRole = 'student';
        }

        loadNotifications();
    } catch (e) { 
        console.error("❌ خطأ في البدء:", e.message);
        list.innerHTML = `<p style="color:#ff6b6b; text-align:center; padding:20px;">يجب تسجيل الدخول أولاً للوصول للإشعارات</p>`;
    }
}

async function loadNotifications() {
    const list = document.getElementById('notifList');
    const countElement = document.getElementById('notif-count');
    try {
        // فلترة الطلبات: كل مستخدم يرى طلباته الخاصة فقط
        const queries = [Query.orderDesc('timestamp')];
        if (userRole === 'teacher') {
            queries.push(Query.equal('teacherId', [currentUser.$id]));
        } else {
            queries.push(Query.equal('studentId', [currentUser.$id]));
        }

        const response = await databases.listDocuments(DB_ID, REQUESTS_COLL, queries);
        if (countElement) countElement.innerText = response.total;

        if (response.total === 0) {
            list.innerHTML = `<div class="empty-state"><p>لا توجد إشعارات جديدة حالياً</p></div>`;
            return;
        }

        list.innerHTML = ""; 

        // استخدام loop متسلسل لضمان جلب بيانات كل طالب بشكل صحيح
        for (const doc of response.documents) {
            if (userRole === 'teacher') {
                let sPhone = "غير متوفر";
                let sYear = "غير محدد";

                try {
                    // جلب بيانات الطالب (الهاتف والسنة الدراسية) من جدول usersdata
                    const sData = await databases.getDocument(DB_ID, USERS_COLL, doc.studentId);
                    sPhone = sData.phone || "بدون رقم";
                    sYear = sData.specialization || "غير محدد";
                } catch (err) { console.warn("تعذر جلب تفاصيل الطالب لـ ID:", doc.studentId); }

                renderTeacherCard(doc, sPhone, sYear);
            } else {
                renderStudentCard(doc);
            }
        }
    } catch (e) { 
        console.error("❌ خطأ في جلب الإشعارات:", e.message);
        list.innerHTML = `<p style="color:#ff6b6b;">تعذر جلب الإشعارات: تأكد من صلاحيات الجداول</p>`;
    }
}

function renderTeacherCard(doc, phone, year) {
    const list = document.getElementById('notifList');
    const status = doc.status || 'pending';
    
    list.innerHTML += `
        <div class="notif-item">
            <div class="notif-content">
                <h4>طلب انضمام: ${doc.studentName}</h4>
                <div class="student-meta">
                    <span>📞 ${phone}</span> | <span>🎓 ${year}</span>
                </div>
                <p>الحالة: <span class="badge">${status}</span></p>
            </div>
            ${status === 'pending' ? `
            <div class="notif-actions">
                <button class="accept-btn" onclick="handleAccept('${doc.$id}', '${doc.studentId}')">قبول واختيار مجموعة</button>
                <button class="reject-btn" onclick="updateStatus('${doc.$id}', 'rejected')">رفض</button>
            </div>` : ''}
        </div>`;
}

function renderStudentCard(doc) {
    const list = document.getElementById('notifList');
    const isAccepted = doc.status === 'accepted';
    list.innerHTML += `
        <div class="notif-item">
            <div class="notif-content">
                <h4>${isAccepted ? '✅ تم قبول طلبك' : '⏳ طلبك قيد المراجعة'}</h4>
                <p>${isAccepted ? `أهلاً بك! تم إضافتك لمجموعة: <b>${doc.groupName || 'الأساسية'}</b>` : 'سيتم إشعارك فور رد المدرس على طلبك.'}</p>
            </div>
        </div>`;
}

async function handleAccept(docId, studentId) {
    try {
        // جلب مجموعات المدرس الحالية من جدول groups
        const groupsRes = await databases.listDocuments(DB_ID, GROUPS_COLL, [
            Query.equal('teacherId', [currentUser.$id])
        ]);

        if (groupsRes.total === 0) {
            alert("⚠️ لا توجد مجموعات مسجلة لديك حالياً. يرجى إنشاء مجموعة أولاً.");
            return;
        }

        let options = groupsRes.documents.map((g, i) => `${i + 1}- ${g.name}`).join("\n");
        let choice = prompt(`اختر رقم المجموعة لإضافة الطالب إليها:\n${options}`);
        
        const selectedGroup = groupsRes.documents[parseInt(choice) - 1];
        if (selectedGroup) {
            // تحديث الطلب بالحالة الجديدة واسم المجموعة المختار
            await databases.updateDocument(DB_ID, REQUESTS_COLL, docId, { 
                status: 'accepted',
                groupName: selectedGroup.name 
            });
            alert(`تم قبول الطالب بنجاح في مجموعة "${selectedGroup.name}"`);
            loadNotifications();
        } else {
            alert("اختيار غير صحيح.");
        }
    } catch (e) { alert("حدث خطأ أثناء القبول: " + e.message); }
}

async function updateStatus(docId, newStatus) {
    try {
        await databases.updateDocument(DB_ID, REQUESTS_COLL, docId, { status: newStatus });
        loadNotifications();
    } catch (e) { alert("خطأ في تحديث الحالة: " + e.message); }
}

init();



        function applyTheme() {
            const theme = localStorage.getItem('theme') || 'dark'; // EduConnect يفضل الـ Dark
            document.body.classList.toggle('dark-mode', theme === 'dark');
            document.getElementById('main-logo').src = theme === 'dark' ? 'dark.png' : 'sunlight.png';
        }

        init();
    </script>
</body>
</html>
